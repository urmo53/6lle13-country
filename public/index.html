<!doctype html>
<html lang="et">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ÕLLE 13 Country</title>
    <style>
      :root {
        --bg-1: #120c07;
        --bg-2: #22160d;
        --panel: rgba(28, 18, 11, 0.82);
        --panel-2: rgba(44, 28, 16, 0.92);
        --text: #fff7ee;
        --muted: #d7bda1;
        --accent: #efb55f;
        --accent-2: #ffe1b0;
        --border: rgba(255, 222, 173, 0.14);
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        color: var(--text);
        font-family: Inter, Arial, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 197, 102, 0.18), transparent 28%),
          radial-gradient(circle at top right, rgba(255, 176, 77, 0.14), transparent 30%),
          linear-gradient(135deg, var(--bg-1), var(--bg-2));
      }

      .page {
        width: 100vw;
        height: 100vh;
        padding: 34px 42px;
        display: flex;
        flex-direction: column;
      }

      .hero-title {
        margin: 0 0 24px;
        text-align: center;
        font-size: clamp(2.8rem, 4vw, 4.8rem);
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent-2);
        text-shadow: 0 6px 20px rgba(0, 0, 0, 0.45);
        flex: 0 0 auto;
      }

      .layout {
        flex: 1;
        display: grid;
        grid-template-columns: minmax(420px, 45vw) minmax(420px, 1fr);
        gap: 34px;
        min-height: 0;
      }

      .left-column,
      .right-column {
        min-height: 0;
      }

      .cover-frame {
        width: 100%;
        height: 100%;
        border-radius: 34px;
        overflow: hidden;
        border: 1px solid var(--border);
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .cover-frame img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .right-column {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        min-height: 0;
        padding: 34px 34px 28px;
        border-radius: 34px;
        border: 1px solid var(--border);
        background: linear-gradient(180deg, var(--panel), var(--panel-2));
        box-shadow: var(--shadow);
      }

      .top-info {
        text-align: center;
      }

      .now-label,
      .previous-label {
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.16em;
        font-size: 0.95rem;
        font-weight: 700;
      }

      .track-title {
        margin-top: 16px;
        font-size: clamp(2.4rem, 4vw, 4.3rem);
        line-height: 1.05;
        font-weight: 900;
        letter-spacing: -0.02em;
        word-break: break-word;
      }

      .track-artist {
        margin-top: 14px;
        color: var(--accent-2);
        font-size: clamp(1.2rem, 2vw, 1.9rem);
        font-weight: 600;
        min-height: 1.5em;
      }

      .middle-controls {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 20px 0;
      }

      .play-button {
        width: 180px;
        height: 86px;
        border: none;
        border-radius: 999px;
        background: linear-gradient(180deg, #ffd89a, #efb55f);
        color: #2b1706;
        font-size: 2rem;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 0 16px 32px rgba(0, 0, 0, 0.34);
        transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
      }

      .play-button:hover {
        transform: scale(1.03);
        filter: brightness(1.04);
      }

      .play-button:active {
        transform: scale(0.98);
      }

      .play-button:focus,
      .play-button:focus-visible {
        outline: 4px solid #fff2d3;
        outline-offset: 6px;
        transform: scale(1.04);
      }

      .visualizer {
        display: flex;
        align-items: flex-end;
        justify-content: center;
        gap: 12px;
        height: 96px;
        margin-top: 28px;
      }

      .bar {
        width: 16px;
        height: 18px;
        border-radius: 999px;
        background: linear-gradient(180deg, #fff1cf, #efb55f);
        transform-origin: bottom;
        opacity: 0.35;
        box-shadow: 0 4px 12px rgba(239, 181, 95, 0.22);
      }

      .visualizer.playing .bar {
        opacity: 1;
        animation: bounce 1s ease-in-out infinite;
      }

      .visualizer.playing .bar:nth-child(1) { animation-duration: 0.88s; }
      .visualizer.playing .bar:nth-child(2) { animation-duration: 1.12s; }
      .visualizer.playing .bar:nth-child(3) { animation-duration: 0.82s; }
      .visualizer.playing .bar:nth-child(4) { animation-duration: 1.02s; }
      .visualizer.playing .bar:nth-child(5) { animation-duration: 0.94s; }

      @keyframes bounce {
        0%, 100% { transform: scaleY(0.32); }
        20% { transform: scaleY(0.95); }
        40% { transform: scaleY(0.52); }
        60% { transform: scaleY(1.7); }
        80% { transform: scaleY(0.74); }
      }

      .stream-status {
        margin-top: 14px;
        min-height: 1.4em;
        color: var(--muted);
        font-size: 1.05rem;
        text-align: center;
      }

      .bottom-panel {
        border-radius: 24px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        padding: 18px 20px;
      }

      .previous-content {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 96px 1fr;
        gap: 14px;
        align-items: center;
      }

      .previous-content img {
        width: 96px;
        height: 96px;
        border-radius: 18px;
        object-fit: cover;
        display: block;
      }

      .previous-title {
        font-size: 1rem;
        font-weight: 800;
        line-height: 1.2;
      }

      .previous-artist {
        margin-top: 6px;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.2;
      }

      @media (max-width: 1280px) {
        .page {
          overflow: auto;
          height: auto;
          min-height: 100vh;
        }

        .layout {
          grid-template-columns: 1fr;
        }

        .cover-frame {
          aspect-ratio: 1 / 1;
          height: auto;
          min-height: 320px;
        }

        .right-column {
          min-height: 520px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1 class="hero-title">ÕLLE 13 Country</h1>

      <section class="layout">
        <div class="left-column">
          <div class="cover-frame">
            <img id="mainCover" src="/pilt.png" alt="Hetkel mängiva loo pilt" />
          </div>
        </div>

        <div class="right-column">
          <div class="top-info">
            <div class="now-label">Hetkel mängib</div>
            <div class="track-title" id="trackTitle">Laen infot...</div>
            <div class="track-artist" id="trackArtist"></div>
          </div>

          <div class="middle-controls">
            <button id="playButton" class="play-button" aria-label="Mängi või peata">
              <span id="playIcon">▶</span>
            </button>

            <div class="visualizer" id="visualizer" aria-hidden="true">
              <span class="bar"></span>
              <span class="bar"></span>
              <span class="bar"></span>
              <span class="bar"></span>
              <span class="bar"></span>
            </div>

            <div class="stream-status" id="streamStatus">Striim peatatud</div>
          </div>

          <div class="bottom-panel">
            <div class="previous-label">Eelmine lugu</div>
            <div class="previous-content">
              <img id="previousCover" src="/pilt.png" alt="Eelmise loo pilt" />
              <div class="previous-meta">
                <div class="previous-title" id="previousTitle">—</div>
                <div class="previous-artist" id="previousArtist"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <audio id="player" preload="none" crossorigin="anonymous">
      <source src="http://router.euddn.net/8103046e16b71d15d692b57c187875c7/dc_duocountry.mp3" type="audio/mpeg" />
    </audio>

    <script src="/app.js"></script>
  </body>
</html>
