<!doctype html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ÕLLE 13 Country</title>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
    }

    body {
      background: #120c07;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .wrapper {
      width: 100%;
      max-width: 980px;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 34px;
      letter-spacing: 4px;
      color: #ffe1b0;
    }

    .layout {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }

    .box {
      width: 400px;
      height: 400px;
      background: #1f140c;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    .cover-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .player-box {
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .top-block { min-height: 110px; }

    .now-label {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #c9ae8f;
      margin-bottom: 10px;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      line-height: 1.15;
      min-height: 56px;
    }

    .artist {
      margin-top: 8px;
      font-size: 16px;
      color: #ffd89a;
      min-height: 20px;
    }

    .middle-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 120px;
    }

    .play-btn {
      width: 90px;
      height: 45px;
      border-radius: 999px;
      border: none;
      background: #efb55f;
      color: #2b1706;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .visualizer {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 6px;
      height: 42px;
      margin-top: 14px;
    }

    .bar {
      width: 8px;
      height: 12px;
      background: #efb55f;
      border-radius: 999px;
      transform-origin: bottom center;
      opacity: 0.45;
    }

    .visualizer.playing .bar {
      opacity: 1;
      animation: bounce 1s infinite ease-in-out;
    }

    .visualizer.playing .bar:nth-child(1) { animation-duration: 0.90s; }
    .visualizer.playing .bar:nth-child(2) { animation-duration: 1.05s; }
    .visualizer.playing .bar:nth-child(3) { animation-duration: 0.82s; }
    .visualizer.playing .bar:nth-child(4) { animation-duration: 1.10s; }
    .visualizer.playing .bar:nth-child(5) { animation-duration: 0.95s; }

    @keyframes bounce {
      0%, 100% { transform: scaleY(0.5); }
      50% { transform: scaleY(2.3); }
    }

    .stream-status {
      margin-top: 10px;
      min-height: 16px;
      font-size: 12px;
      color: #c9ae8f;
    }

    .bottom-block {
      background: rgba(255,255,255,0.04);
      border-radius: 14px;
      padding: 10px;
      text-align: left;
    }

    .previous-label {
      font-size: 11px;
      color: #c9ae8f;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .previous {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 60px;
    }

    .previous img {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      display: block;
    }

    .prev-text { overflow: hidden; }

    #previousTitle {
      font-size: 12px;
      font-weight: bold;
      line-height: 1.2;
    }

    #previousArtist {
      margin-top: 4px;
      font-size: 12px;
      color: #c9ae8f;
      line-height: 1.2;
    }

    #debugBox {
      position: fixed;
      left: 10px;
      bottom: 10px;
      width: 460px;
      max-height: 230px;
      overflow: auto;
      background: rgba(0, 0, 0, 0.78);
      color: #00ff88;
      font-size: 12px;
      line-height: 1.35;
      padding: 10px;
      border-radius: 8px;
      font-family: monospace;
      text-align: left;
      white-space: pre-wrap;
      z-index: 99999;
      border: 1px solid rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>ÕLLE 13 Country</h1>

    <div class="layout">
      <div class="box cover-box">
        <img id="mainCover" src="/pilt.png" alt="Hetkel mängiva loo pilt" />
      </div>

      <div class="box player-box">
        <div class="top-block">
          <div class="now-label">Hetkel mängib</div>
          <div class="title" id="trackTitle">Laen...</div>
          <div class="artist" id="trackArtist"></div>
        </div>

        <div class="middle-block">
          <button id="playButton" class="play-btn" aria-label="Mängi või peata">
            <span id="playIcon">▶</span>
          </button>

          <div class="visualizer" id="visualizer" aria-hidden="true">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
          </div>

          <div class="stream-status" id="streamStatus">Striim peatatud</div>
        </div>

        <div class="bottom-block">
          <div class="previous-label">Eelmine lugu</div>
          <div class="previous">
            <img id="previousCover" src="/pilt.png" alt="Eelmise loo pilt" />
            <div class="prev-text">
              <div id="previousTitle">—</div>
              <div id="previousArtist"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <audio id="player" preload="none" crossorigin="anonymous"></audio>

  <div id="debugBox">DEBUG LOG</div>

  <script src="/app.js?v=debug2"></script>
</body>
</html>
