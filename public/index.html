<!doctype html>
<html lang="et">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ÕLLE 13 Country</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #120c07;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .wrapper {
        text-align: center;
      }

      h1 {
        margin-bottom: 20px;
        font-size: 36px;
        letter-spacing: 4px;
      }

      .layout {
        display: flex;
        gap: 20px;
        justify-content: center;
        align-items: center;
      }

      .box {
        width: 400px;
        height: 400px;
        background: #1f140c;
        border-radius: 20px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 15px;
      }

      .cover img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 12px;
      }

      .title {
        font-size: 22px;
        font-weight: bold;
      }

      .artist {
        font-size: 16px;
        color: #ffd89a;
      }

      .play-btn {
        width: 90px;
        height: 45px;
        border-radius: 999px;
        border: none;
        background: #efb55f;
        font-size: 20px;
        cursor: pointer;
        margin: 10px auto;
      }

      .visualizer {
        display: flex;
        justify-content: center;
        gap: 6px;
        height: 40px;
      }

      .bar {
        width: 8px;
        height: 10px;
        background: #efb55f;
      }

      .visualizer.playing .bar {
        animation: bounce 1s infinite;
      }

      @keyframes bounce {
        0%,100% { height: 10px; }
        50% { height: 30px; }
      }

      .previous {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 10px;
      }

      .previous img {
        width: 60px;
        height: 60px;
        border-radius: 8px;
      }

      .prev-text {
        font-size: 12px;
        text-align: left;
      }
    </style>
  </head>

  <body>
    <div class="wrapper">
      <h1>ÕLLE 13 Country</h1>

      <div class="layout">
        <!-- LEFT -->
        <div class="box cover">
          <img id="mainCover" src="/pilt.png" />
        </div>

        <!-- RIGHT -->
        <div class="box">
          <div>
            <div class="title" id="trackTitle">Laen...</div>
            <div class="artist" id="trackArtist"></div>
          </div>

          <button id="playButton" class="play-btn">
            <span id="playIcon">▶</span>
          </button>

          <div class="visualizer" id="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
          </div>

          <div class="previous">
            <img id="previousCover" src="/pilt.png" />
            <div class="prev-text">
              <div id="previousTitle">—</div>
              <div id="previousArtist"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <audio id="player">
      <source src="http://router.euddn.net/8103046e16b71d15d692b57c187875c7/dc_duocountry.mp3" />
    </audio>

    <script src="/app.js"></script>
  </body>
</html>
