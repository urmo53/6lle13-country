<!doctype html>
<html lang="et">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ÕLLE 13 Country</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      body {
        font-family: Arial, sans-serif;
        background: #120c07;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      .wrapper {
        width: 100%;
        max-width: 980px;
        padding: 20px;
        text-align: center;
      }

      h1 {
        margin: 0 0 20px;
        font-size: 34px;
        letter-spacing: 4px;
        color: #ffe1b0;
      }

      .layout {
        display: flex;
        gap: 20px;
        justify-content: center;
        align-items: center;
      }

      .box {
        width: 400px;
        height: 400px;
        background: #1f140c;
        border-radius: 20px;
        overflow: hidden;
        padding: 14px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      }

      .cover {
        padding: 0;
      }

      .cover img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .player-box {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .now-label {
        font-size: 12px;
        color: #c9ae8f;
        text-transform: uppercase;
        letter-spacing: 2px;
      }

      .title {
        margin-top: 10px;
        font-size: 24px;
        font-weight: bold;
        line-height: 1.15;
      }

      .artist {
        margin-top: 8px;
        font-size: 16px;
        color: #ffd89a;
        min-height: 20px;
      }

      .play-btn {
        width: 90px;
        height: 45px;
        border-radius: 999px;
        border: none;
        background: #efb55f;
        color: #2b1706;
        font-size: 20px;
        font-weight: bold;
        cursor: pointer;
        margin: 0 auto;
      }

      .play-btn:focus,
      .play-btn:focus-visible {
        outline: 3px solid #fff2d3;
        outline-offset: 4px;
      }

      .visualizer {
        display: flex;
        justify-content: center;
        align-items: flex-end;
        gap: 6px;
        height: 42px;
        margin-top: 8px;
      }

      .bar {
        width: 8px;
        height: 10px;
        border-radius: 999px;
        background: #efb55f;
        opacity: 0.45;
        transform-origin: bottom;
      }

      .visualizer.playing .bar {
        opacity: 1;
        animation: bounce 1s infinite ease-in-out;
      }

      .visualizer.playing .bar:nth-child(1) { animation-duration: 0.9s; }
      .visualizer.playing .bar:nth-child(2) { animation-duration: 1.1s; }
      .visualizer.playing .bar:nth-child(3) { animation-duration: 0.8s; }
      .visualizer.playing .bar:nth-child(4) { animation-duration: 1s; }
      .visualizer.playing .bar:nth-child(5) { animation-duration: 0.95s; }

      @keyframes bounce {
        0%, 100% { transform: scaleY(0.45); }
        50% { transform: scaleY(2.4); }
      }

      .stream-status {
        margin-top: 8px;
        min-height: 18px;
        font-size: 12px;
        color: #c9ae8f;
      }

      .previous-card {
        margin-top: 8px;
        padding: 10px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
      }

      .previous-label {
        font-size: 11px;
        color: #c9ae8f;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-align: left;
      }

      .previous {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 8px;
      }

      .previous img {
        width: 60px;
        height: 60px;
        border-radius: 8px;
        object-fit: cover;
        flex-shrink: 0;
      }

      .prev-text {
        font-size: 12px;
        text-align: left;
        overflow: hidden;
      }

      #previousTitle {
        font-weight: bold;
        line-height: 1.2;
      }

      #previousArtist {
        margin-top: 4px;
        color: #c9ae8f;
        line-height: 1.2;
      }
    </style>
  </head>

  <body>
    <div class="wrapper">
      <h1>ÕLLE 13 Country</h1>

      <div class="layout">
        <div class="box cover">
          <img id="mainCover" src="/pilt.png" alt="Hetkel mängiva loo pilt" />
        </div>

        <div class="box player-box">
          <div>
            <div class="now-label">Hetkel mängib</div>
            <div class="title" id="trackTitle">Laen...</div>
            <div class="artist" id="trackArtist"></div>
          </div>

          <div>
            <button id="playButton" class="play-btn" aria-label="Mängi või peata">
              <span id="playIcon">▶</span>
            </button>

            <div class="visualizer" id="visualizer">
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
            </div>

            <div class="stream-status" id="streamStatus">Striim peatatud</div>
          </div>

          <div class="previous-card">
            <div class="previous-label">Eelmine lugu</div>
            <div class="previous">
              <img id="previousCover" src="/pilt.png" alt="Eelmise loo pilt" />
              <div class="prev-text">
                <div id="previousTitle">—</div>
                <div id="previousArtist"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <audio id="player" preload="none" crossorigin="anonymous">
      <source src="http://router.euddn.net/8103046e16b71d15d692b57c187875c7/dc_duocountry.mp3" type="audio/mpeg" />
    </audio>

    <script src="/app.js"></script>
  </body>
</html>
